repos:
  - repo: local
    hooks:
      - id: uv-export-requirements
        name: Regenerate requirements.txt from uv.lock
        entry: uv export --format requirements-txt --no-hashes --no-emit-project --no-dev -o requirements.txt
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
        stages: [pre-commit]
